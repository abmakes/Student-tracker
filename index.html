  }

  /* ---------------- class timer ---------------- */
  var TIMER_PRESETS = [
    { label:'5 min', seconds:300 },
    { label:'3 min', seconds:180 },
    { label:'2 min', seconds:120 },
    { label:'1 min', seconds:60 },
    { label:'30s', seconds:30 },
    { label:'10s', seconds:10 }
  ];
  var timerState = {
    totalMs: 60000,
    remainingMs: 60000,
    running: false,
    raf: null,
    lastTick: 0,
    exploded: false,
    presetSeconds: 60,
    lastTickSecond: null
  };
  var timerAudioCtx = null;

  function formatTimer(ms){
    var totalSec = Math.max(0, Math.ceil(ms / 1000));
    var m = Math.floor(totalSec / 60);
    var s = totalSec % 60;
    return m + ':' + String(s).padStart(2, '0');
  }

  function ensureTimerAudio(){
    var Ctx = window.AudioContext || window.webkitAudioContext;
    if(!Ctx) return null;
    if(!timerAudioCtx) timerAudioCtx = new Ctx();
    if(timerAudioCtx.state === 'suspended') timerAudioCtx.resume();
    return timerAudioCtx;
  }

  function playTickSound(urgent){
    var ctx = ensureTimerAudio();
    if(!ctx) return;
    var now = ctx.currentTime;
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(urgent ? 980 : 760, now);
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(urgent ? 0.28 : 0.16, now + 0.005);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + (urgent ? 0.09 : 0.06));
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 0.1);
  }

  function playExplosionSound(){
    var ctx = ensureTimerAudio();
    if(!ctx) return;
    var now = ctx.currentTime;

    function tone(type, freqStart, freqEnd, when, dur, peak){
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freqStart, when);
      osc.frequency.exponentialRampToValueAtTime(Math.max(20, freqEnd), when + dur);
      gain.gain.setValueAtTime(0.0001, when);
      gain.gain.exponentialRampToValueAtTime(peak, when + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, when + dur);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(when);
      osc.stop(when + dur + 0.02);
    }

    // Deep boom + mid crack
    tone('sine', 90, 28, now, 1.1, 1.2);
    tone('triangle', 180, 45, now, 0.7, 0.7);
    tone('sawtooth', 320, 60, now + 0.02, 0.35, 0.35);

    // Heavy noise blast
    var duration = 1.05;
    var buffer = ctx.createBuffer(1, Math.floor(ctx.sampleRate * duration), ctx.sampleRate);
    var data = buffer.getChannelData(0);
    for(var i = 0; i < data.length; i++){
      var t = i / data.length;
      var envelope = Math.pow(1 - t, 1.15);
      data[i] = (Math.random() * 2 - 1) * envelope;
    }
    var noise = ctx.createBufferSource();
    noise.buffer = buffer;
    var filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(4200, now);
    filter.frequency.exponentialRampToValueAtTime(180, now + duration);
    var noiseGain = ctx.createGain();
    noiseGain.gain.setValueAtTime(0.0001, now);
    noiseGain.gain.exponentialRampToValueAtTime(1.4, now + 0.015);
    noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
    noise.connect(filter);
    filter.connect(noiseGain);
    noiseGain.connect(ctx.destination);
    noise.start(now);

    // Second delayed thud
    tone('sine', 70, 22, now + 0.12, 0.85, 0.9);
  }

  function stopTimerLoop(){
    if(timerState.raf){
      cancelAnimationFrame(timerState.raf);
      timerState.raf = null;
    }
    timerState.running = false;
    timerState.lastTick = 0;
  }

  function updateTimerDom(){
    var overlay = document.getElementById('classTimerOverlay');
    if(!overlay) return;
    var timeEl = document.getElementById('timerTime');
    var bombEl = document.getElementById('timerBomb');
    var progress = document.getElementById('timerRingProgress');
    var pauseBtn = document.getElementById('timerPauseBtn');
    if(timeEl) timeEl.textContent = formatTimer(timerState.remainingMs);
    var secsLeft = Math.ceil(timerState.remainingMs / 1000);
    if(bombEl) bombEl.classList.toggle('show', secsLeft > 0 && secsLeft <= 15);
    if(progress){
      var circ = 2 * Math.PI * 54;
      var ratio = timerState.totalMs > 0 ? clamp(timerState.remainingMs / timerState.totalMs, 0, 1) : 0;
      progress.style.strokeDasharray = String(circ);
      progress.style.strokeDashoffset = String(circ * (1 - ratio));
    }
    if(pauseBtn) pauseBtn.textContent = timerState.running ? '❚❚' : '▶';
    overlay.querySelectorAll('[data-timer-preset]').forEach(function(btn){
      btn.classList.toggle('active', Number(btn.getAttribute('data-timer-preset')) === timerState.presetSeconds);
    });
  }

  function timerFrame(ts){
    if(!timerState.running) return;
    if(!timerState.lastTick) timerState.lastTick = ts;
    var delta = ts - timerState.lastTick;
    timerState.lastTick = ts;
    timerState.remainingMs = Math.max(0, timerState.remainingMs - delta);

    var secsLeft = Math.ceil(timerState.remainingMs / 1000);
    if(secsLeft > 0 && secsLeft <= 15 && secsLeft !== timerState.lastTickSecond){
      timerState.lastTickSecond = secsLeft;
      playTickSound(secsLeft <= 5);
    }

    updateTimerDom();
    if(timerState.remainingMs <= 0){
      stopTimerLoop();
      updateTimerDom();
      if(!timerState.exploded){
        timerState.exploded = true;
        playExplosionSound();
        showToast('⏰ Time!');
      }
      return;
    }
    timerState.raf = requestAnimationFrame(timerFrame);
  }

  function startTimer(){
    if(timerState.remainingMs <= 0){
      timerState.remainingMs = timerState.totalMs;
      timerState.exploded = false;
    }
    if(timerState.running) return;
    ensureTimerAudio();
    timerState.running = true;
    timerState.lastTick = 0;
    timerState.raf = requestAnimationFrame(timerFrame);
    updateTimerDom();
  }

  function pauseTimer(){
    stopTimerLoop();
    updateTimerDom();
  }

  function toggleTimerPause(){
    if(timerState.running) pauseTimer();
    else startTimer();
  }

  function resetTimer(){
    stopTimerLoop();
    timerState.remainingMs = timerState.totalMs;
    timerState.exploded = false;
    timerState.lastTickSecond = null;
    updateTimerDom();
  }

  function setTimerPreset(seconds){
    stopTimerLoop();
    timerState.presetSeconds = seconds;
    timerState.totalMs = seconds * 1000;
    timerState.remainingMs = timerState.totalMs;
    timerState.exploded = false;
    timerState.lastTickSecond = null;
    updateTimerDom();
  }

  function closeClassTimer(){
    stopTimerLoop();
    var overlay = document.getElementById('classTimerOverlay');
    if(overlay) overlay.remove();
  }

  function openClassTimer(){
    closeRewardsModal();
    var existing = document.getElementById('classTimerOverlay');
    if(existing){ existing.remove(); }

    var presetsHtml = TIMER_PRESETS.map(function(p){
      return '<button class="timer-preset" data-timer-preset="' + p.seconds + '">' + p.label + '</button>';
    }).join('');

    var overlay = document.createElement('div');
    overlay.className = 'timer-overlay';
    overlay.id = 'classTimerOverlay';
    overlay.innerHTML =
      '<div class="timer-top">' +
        '<button class="timer-close" id="timerCloseBtn" title="Close">✕</button>' +
        '<div class="timer-presets">' + presetsHtml + '</div>' +
        '<span style="width:40px"></span>' +
      '</div>' +
      '<div class="timer-stage">' +
        '<div class="timer-ring-wrap">' +
          '<svg class="timer-ring" viewBox="0 0 120 120" aria-hidden="true">' +
            '<circle class="timer-ring-track" cx="60" cy="60" r="54"></circle>' +
            '<circle class="timer-ring-progress" id="timerRingProgress" cx="60" cy="60" r="54"></circle>' +
          '</svg>' +
          '<div class="timer-center">' +
            '<div class="timer-bomb" id="timerBomb">💣</div>' +
            '<div class="timer-time" id="timerTime">1:00</div>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="timer-controls">' +
        '<button class="timer-ctrl" id="timerPauseBtn" title="Pause / Start">▶</button>' +
        '<button class="timer-ctrl primary" id="timerResetBtn" title="Reset">↺</button>' +
      '</div>';
    document.body.appendChild(overlay);

    if(!timerState.totalMs) setTimerPreset(60);
    updateTimerDom();

    document.getElementById('timerCloseBtn').addEventListener('click', closeClassTimer);
    document.getElementById('timerPauseBtn').addEventListener('click', toggleTimerPause);
    document.getElementById('timerResetBtn').addEventListener('click', resetTimer);
    overlay.querySelectorAll('[data-timer-preset]').forEach(function(btn){
      btn.addEventListener('click', function(){
        setTimerPreset(Number(btn.getAttribute('data-timer-preset')));
      });
    });
  }

  /* ---------------- end class / archive ---------------- */
  async function finishEndClass(cls, report){
    await appendReport(cls.id, report);

    cls.students.forEach(function(s){
      s.positive = 0; s.negative = 0;
      s.absent = false;
      s.homework = defaultHomework();
      s.skills = { songs:false, stories:false, phonics:false, blending:false };
      if(isOlderClass(cls)) s.skillsOlder = defaultSkillsOlder();
    });
    await saveRoster(cls.id, cls);
    await clearActiveClassId();
    state.currentClass = null;
    renderHome();
    showToast('Session archived — fresh start for next class!');
  }

  async function endClass(){
    var cls = state.currentClass;
    if(!window.confirm('End this class session? Today\'s scores will be saved to history and reset to zero for next time.')) return;

    var older = isOlderClass(cls);
    var lmsRows = older ? buildOlderLmsRows(cls) : null;

    var report = {
      reportId: 'rep_' + todayISO().replace(/-/g,'') + '_' + Date.now().toString(36),
      classId: cls.id,
      timestamp: new Date().toISOString(),
      studentMetrics: cls.students.map(function(s){
        var hw = ensureHomework(s);
        var base = {
          studentName: s.name,
          absent: !!s.absent,
          homework: {
            complete: hw.complete,
            effort: hw.effort,
            quality: hw.quality,
            completeLabel: lmsLabel(hw.complete),
            effortLabel: lmsLabel(hw.effort),
            qualityLabel: lmsLabel(hw.quality)
          },
          behavior: {
            positiveStars: s.positive,
            negativeDots: s.negative,
            maxStarsTriggered: s.positive >= 5
          },
          skillsAttained: {
            songsAndChants: s.skills.songs,
            storiesAndChants: s.skills.stories,
            phonics: s.skills.phonics,
            blending: s.skills.blending
          }
        };
        if(older){
          var so = ensureSkillsOlder(s);
          base.skillsOlder = {
            vocabulary: so.vocabulary,
            understanding: so.understanding,
            quality: so.quality,
            interaction: so.interaction
          };
          base.lmsScores = lmsRows.find(function(r){ return r.studentName === s.name; }) || null;
        }
        return base;
      })
    };

    if(older){
      showOlderLmsReport(lmsRows, function(){ finishEndClass(cls, report); });
      return;
    }

    await finishEndClass(cls, report);
  }

  /* ---------------- go ---------------- */
  init();

  // Register the service worker for offline/installable use when hosted on a real
  // origin. Safely no-ops inside sandboxed preview environments that don't allow it.
  if('serviceWorker' in navigator){
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('./sw.js').catch(function(){ /* preview sandbox: ignore */ });
    });
  }
})();
</script>
