<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Class Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png" type="image/png">
<meta name="theme-color" content="#6C4AB6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Class Tracker">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6F5FB;
    --ink:#14151F;
    --border-color:#14151F;
    --card-bg:#FFFFFF;
    --card-bg-soft:#FBFAFF;
    --ninja:#6C4AB6;
    --ninja-deep:#4E3486;
    --gold:#FFB627;
    --coral:#FF5D5D;
    --mint:#25B889;
    --pink:#FF6FA5;
    --muted:#8A88A3;
    --track-line:#E7E4F6;
    --hairline:#E1DEEE;
    --chrome-bg:#F1F0F6;
    --soft-shadow:#D3D0E8;
    --emoji-scale:1;
    --radius:16px;
    --shadow-off:4px;
    --font-display:'Baloo 2','Segoe UI Rounded',sans-serif;
    --font-body:'Inter',system-ui,-apple-system,sans-serif;
  }
  [data-theme="dark"]{
    --paper:#15162A;
    --ink:#F1F0F8;
    --border-color:#F1F0F8;
    --card-bg:#20223D;
    --card-bg-soft:#262848;
    --ninja:#B6A2F2;
    --ninja-deep:#9B87D9;
    --gold:#FFC94A;
    --coral:#FF7A7A;
    --mint:#3ED2A0;
    --pink:#FF8DBA;
    --muted:#9997B8;
    --track-line:#33355A;
    --hairline:#33355A;
    --chrome-bg:#1E2038;
    --soft-shadow:#454875;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
    overscroll-behavior:none;
  }
  #app{min-height:100dvh; display:flex; flex-direction:column;}
  button{font-family:inherit; cursor:pointer;}
  button:focus-visible, input:focus-visible, textarea:focus-visible, [tabindex]:focus-visible{
    outline:3px solid var(--ninja); outline-offset:2px;
  }
  input,textarea{font-family:inherit;}
  .hidden{display:none !important;}

  /* ---------- comic panel primitive ---------- */
  .comic-panel{
    background:var(--card-bg);
    border:3px solid var(--border-color);
    box-shadow:var(--shadow-off) var(--shadow-off) 0 var(--border-color);
    border-radius:var(--radius);
  }

  /* ================= HOME SCREEN ================= */
  #home-screen{
    flex:1;
    display:flex;
    justify-content:center;
    padding:28px 16px 60px;
  }
  .home-inner{width:100%; max-width:640px;}
  .home-hero{
    display:flex; align-items:center; gap:14px; margin-bottom:22px;
  }
  .home-hero .mark{
    font-size:38px; line-height:1;
    filter:drop-shadow(2px 2px 0 var(--border-color));
  }
  .home-hero h1{
    font-family:var(--font-display); font-weight:800; font-size:26px; margin:0;
    letter-spacing:.2px;
  }
  .home-hero p{margin:2px 0 0; color:var(--muted); font-size:13.5px;}

  .field-block{margin-bottom:16px;}
  .field-label{
    display:block; font-family:var(--font-display); font-weight:700; font-size:13px;
    text-transform:uppercase; letter-spacing:.06em; color:var(--ninja); margin-bottom:6px;
  }
  #classNameInput, #studentNamesInput{
    width:100%; border:3px solid var(--border-color); border-radius:12px;
    padding:11px 13px; font-size:15px; background:var(--card-bg); color:var(--ink);
  }
  #studentNamesInput{min-height:130px; resize:vertical; line-height:1.5;}

  .age-toggle{display:flex; gap:10px;}
  .age-btn{
    flex:1; padding:11px 10px; border:3px solid var(--border-color); border-radius:12px;
    background:var(--card-bg); color:var(--ink); font-weight:700; font-size:14px;
    display:flex; align-items:center; justify-content:center; gap:6px;
    transition:transform .12s ease;
  }
  .age-btn.active{
    background:var(--ninja); color:#fff; box-shadow:3px 3px 0 var(--border-color); transform:translate(-2px,-2px);
  }

  .start-btn{
    width:100%; margin-top:6px; padding:14px; border:3px solid var(--border-color); border-radius:14px;
    background:var(--gold); color:var(--ink); font-family:var(--font-display); font-weight:800; font-size:17px;
    box-shadow:4px 4px 0 var(--border-color);
    transition:transform .1s ease, box-shadow .1s ease;
  }
  .start-btn:active{transform:translate(4px,4px); box-shadow:0 0 0 var(--border-color);}
  .start-btn:disabled{opacity:.45; cursor:not-allowed;}
  .resume-btn{background:var(--mint); margin-bottom:12px;}

  .limit-note{font-size:12.5px; color:var(--coral); margin-top:8px; font-weight:600;}

  .saved-heading{
    font-family:var(--font-display); font-weight:700; font-size:15px; margin:30px 0 10px;
    display:flex; align-items:center; gap:8px;
  }
  .saved-grid{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px;
  }
  .class-card{
    position:relative; padding:14px 12px 12px; text-align:left; border:3px solid var(--border-color);
    border-radius:14px; background:var(--card-bg); box-shadow:3px 3px 0 var(--border-color);
    transition:transform .1s ease; cursor:pointer; width:100%; font:inherit; color:inherit;
  }
  .class-card:active{transform:translate(2px,2px); box-shadow:1px 1px 0 var(--border-color);}
  .class-card .cc-name{font-family:var(--font-display); font-weight:700; font-size:15px; display:block; margin-bottom:4px; word-break:break-word;}
  .class-card .cc-meta{font-size:12px; color:var(--muted); font-weight:600; display:block; margin-bottom:10px;}
  .class-card .cc-del{
    position:absolute; top:-8px; right:-8px; width:24px; height:24px; border-radius:50%;
    background:var(--coral); color:#fff; border:2px solid var(--border-color); font-size:13px; font-weight:800;
    display:flex; align-items:center; justify-content:center; line-height:1; cursor:pointer;
  }
  .class-card .cc-manage{
    display:inline-flex; align-items:center; justify-content:center;
    padding:6px 10px; border:2px solid var(--border-color); border-radius:10px;
    background:var(--paper); color:var(--ink); font-size:12px; font-weight:800; cursor:pointer;
    box-shadow:2px 2px 0 var(--border-color);
  }
  .class-card .cc-manage:active{transform:translate(1px,1px); box-shadow:1px 1px 0 var(--border-color);}

  /* ================= CLASS MANAGE / START-OF-CLASS ================= */
  #manage-screen{flex:1; display:flex; flex-direction:column; min-height:100dvh;}
  .manage-header{
    position:sticky; top:0; z-index:20; background:var(--paper);
    display:flex; align-items:center; gap:8px;
    padding:8px 12px; height:46px; border-bottom:1px solid var(--hairline);
  }
  .manage-header .manage-title{
    flex:1; font-family:var(--font-display); font-weight:700; font-size:16.5px;
    text-align:center; color:var(--muted);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding:0 6px;
  }
  .manage-hint{
    padding:8px 12px; font-size:12.5px; color:var(--muted); font-weight:600;
    border-bottom:1px solid var(--hairline); background:var(--chrome-bg);
  }
  .manage-body{
    flex:1; overflow:auto; padding:10px 8px 18px;
    display:flex; flex-direction:column; gap:0; min-height:0;
  }
  .manage-col-headers{
    display:grid;
    grid-template-columns:minmax(88px,1.3fr) 76px 68px 68px 68px 52px;
    gap:6px; align-items:end;
    padding:4px 6px 8px; margin:0 0 4px;
    color:var(--muted); font-size:9.5px; font-weight:700;
    letter-spacing:.04em; text-transform:uppercase;
    border-bottom:1px solid var(--hairline); position:sticky; top:0; z-index:5;
    background:var(--paper);
  }
  .manage-col-headers span{text-align:center; line-height:1.2;}
  .manage-col-headers .mch-name{text-align:left; padding-left:4px;}
  .manage-list{display:flex; flex-direction:column; gap:6px;}
  .manage-row{
    display:grid;
    grid-template-columns:minmax(88px,1.3fr) 76px 68px 68px 68px 52px;
    gap:6px; align-items:center;
    padding:2px 6px; border-radius:12px; background:var(--card-bg);
    min-height:44px;
  }
  .manage-row.is-absent{opacity:.62;}
  .manage-row .name-wrap{min-width:0; justify-content:flex-start; padding:0;}
  .manage-row.is-absent .name-pill{text-decoration:line-through; opacity:.85;}
  .manage-row .name-pill{padding:5px 10px; font-size:14px; max-width:100%;}
  .manage-remove{
    border:1px solid var(--hairline); border-radius:8px; padding:6px 0;
    background:transparent; color:var(--coral); font-size:11px; font-weight:700;
    cursor:pointer; width:100%; text-align:center;
  }
  .manage-chip{
    width:100%; border:1px solid transparent; border-radius:8px;
    padding:7px 4px; font-size:11.5px; font-weight:700; line-height:1.2;
    cursor:pointer; white-space:nowrap; color:var(--ink); text-align:center;
    background:rgba(20,21,31,.06);
  }
  [data-theme="dark"] .manage-chip{background:rgba(241,240,248,.10);}
  .manage-chip:active{filter:brightness(.96);}
  .manage-chip.tone-attend{font-size:11px; padding-left:2px; padding-right:2px;}

  /* Attendance cycle — soft pastels with dark text */
  .manage-chip.tone-present{background:#A9E39B; color:#1F4A28;}
  .manage-chip.tone-absent{background:#FFB3AA; color:#6B2420;}

  /* Complete / Effort / Quality — shared soft score colors */
  .manage-chip.score-1{background:#FFB3AA; color:#6B2420;}
  .manage-chip.score-2{background:#F3E066; color:#4A3B10;}
  .manage-chip.score-3{background:#98D3F5; color:#1A3F5C;}
  .manage-chip.score-4{background:#A9E39B; color:#1F4A28;}
  [data-theme="dark"] .manage-chip.tone-present{background:#294A26; color:#A9E39B;}
  [data-theme="dark"] .manage-chip.tone-absent{background:#5C2E3D; color:#FFB3AA;}
  [data-theme="dark"] .manage-chip.score-1{background:#5C2E3D; color:#FFB3AA;}
  [data-theme="dark"] .manage-chip.score-2{background:#5C5322; color:#F3E066;}
  [data-theme="dark"] .manage-chip.score-3{background:#234A66; color:#98D3F5;}
  [data-theme="dark"] .manage-chip.score-4{background:#294A26; color:#A9E39B;}

  .manage-add{
    display:flex; gap:8px; align-items:stretch; margin-top:12px;
    padding:10px; border:1px dashed var(--track-line); border-radius:12px;
  }
  .manage-add input{
    flex:1; min-width:0; border:1px solid var(--hairline); border-radius:8px;
    padding:9px 11px; font:inherit; background:var(--paper); color:var(--ink);
  }
  .manage-add button{
    border:1px solid var(--hairline); border-radius:8px; padding:9px 12px;
    background:var(--mint); color:#fff; font-weight:700; cursor:pointer; white-space:nowrap;
  }
  .manage-footer{
    flex:none; display:flex; justify-content:center; align-items:center; gap:8px;
    padding:10px 12px; border-top:1px solid var(--hairline); background:var(--chrome-bg);
  }
  .manage-continue{
    width:min(420px, 100%); padding:12px 16px; border:1px solid var(--hairline); border-radius:12px;
    background:var(--gold); color:var(--ink); font-family:var(--font-display); font-weight:800; font-size:16px;
    cursor:pointer;
  }
  .manage-empty{padding:18px; text-align:center; color:var(--muted); font-size:13.5px;}
  @media(max-width:420px){
    .manage-col-headers,
    .manage-row{
      grid-template-columns:minmax(72px,1.1fr) 64px 58px 58px 58px 44px;
      gap:4px;
    }
    .manage-chip{font-size:10.5px; padding:6px 2px;}
    .manage-remove{font-size:10px;}
  }
  .empty-state{
    padding:22px 16px; text-align:center; color:var(--muted); font-size:13.5px;
    border:3px dashed var(--track-line); border-radius:14px;
  }

  /* ================= TRACKER SCREEN ================= */
  #tracker-screen{flex:1; display:flex; flex-direction:column; min-height:100dvh;}

  .tracker-header{
    position:sticky; top:0; z-index:20; background:var(--paper);
    display:flex; align-items:center; justify-content:space-between; gap:8px;
    padding:8px 12px; height:46px; border-bottom:1px solid var(--hairline);
  }
  .icon-btn{
    background:var(--chrome-bg); border:1px solid var(--hairline); border-radius:9px;
    width:34px; height:32px; display:flex; align-items:center; justify-content:center; font-size:16px;
    flex:none; color:var(--muted);
  }
  .icon-btn:active{transform:translate(1px,1px);}
  .theme-icon{width:17px; height:17px; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round;}
  .tracker-title{
    font-family:var(--font-display); font-weight:700; font-size:16.5px; flex:1; text-align:center;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; padding:0 6px; color:var(--muted);
  }
  .header-actions{display:flex; gap:6px; flex:none;}

  /* Teacher-only control strip: deliberately quiet/neutral so a student's eye
     is drawn to the roster below, not to this bar. The primary row never
     wraps -- when skills are toggled on, the bulk skill buttons drop into a
     second accordion row underneath instead of forcing this one onto two lines. */
  .bulk-ribbon{
    display:flex; flex-wrap:nowrap; align-items:center; justify-content:space-between; gap:6px;
    padding:6px 10px; border-bottom:1px solid var(--hairline); background:var(--chrome-bg);
  }
  .skills-subrow{
    display:flex; flex-wrap:wrap; justify-content:center; align-items:center; gap:6px;
    padding:6px 10px 8px; border-bottom:1px solid var(--hairline); background:var(--chrome-bg);
  }
  .ribbon-group{display:flex; gap:5px; align-items:center; flex:none;}
  .ribbon-center{display:flex; gap:6px; align-items:center; flex:none;}
  .rbtn{
    border:1px solid var(--hairline); border-radius:8px; background:var(--card-bg);
    padding:5px 8px; font-size:11.5px; font-weight:600; color:var(--muted); white-space:nowrap;
    display:flex; align-items:center; gap:4px;
  }
  .rbtn:active{background:var(--hairline);}
  .rbtn.skill{padding:5px 7px; font-size:14px; color:var(--ink);}
  .rbtn.skill.all-on{background:var(--ink); border-color:var(--ink);}
  .rbtn.skills-vis{font-weight:700; color:var(--ink);}
  .rbtn.skills-vis.on{background:var(--ink); color:var(--paper);}
  .rbtn.behavior-toggle.off{color:var(--muted); font-style:italic;}
  .ribbon-star{width:12px; height:12px; fill:none; stroke:currentColor; stroke-width:2.4; stroke-linejoin:round; flex:none;}

  .main-area{flex:1; display:flex; flex-direction:column; min-height:0;}
  /* On narrow screens there isn't room for the behavior column + full name +
     stars + skill icons all at once. When skills are toggled open we free up
     space by hiding the whole Bad Behavior column (face + strikes) rather
     than letting names compress/ellipsize. Desktop has room for everything. */
  @media(max-width:499px){
    body.skills-open .neg-zone{display:none;}
  }
  @media(min-width:900px){
    .main-area{flex-direction:row;}
    .grid-pane{flex:2; min-width:0;}
  }

  /* End-of-class-only actions -- deliberately parked at the very bottom, out of
     the way of the moment-to-moment tapping happening above. */
  .footer-bar{
    flex:none; display:flex; justify-content:center; align-items:center; gap:8px;
    padding:8px 10px; border-top:1px solid var(--hairline); background:var(--chrome-bg);
  }
  .rbtn.icon-only{padding:6px 9px;}
  .rbtn.icon-only svg{display:block;}

  .grid-pane{display:flex; flex-direction:column; min-height:0; flex:1;}
  .roster-scroll{
    flex:1; overflow-y:auto; padding:16px 8px 18px;
    display:flex; flex-direction:column; gap:6px;
  }

  /* The row itself stays plain/white -- only the name gets a soft pastel pill,
     so a child scans for "my colour" around their name specifically, not a
     whole colored bar competing with the strikes/stars for attention. */
  .student-row{
    display:flex; align-items:center; gap:4px;
    height:44px; min-height:44px;
    padding:2px 6px;
    border-radius:12px;
    background:var(--card-bg);
  }

  .neg-zone{display:flex; align-items:center; gap:4px; flex:none;}
  .neg-zone.maxed{background:rgba(255,93,93,.16); border-radius:8px; padding:2px 5px 2px 3px;}
  .face-btn{
    font-size:calc(19px * var(--emoji-scale)); background:none; border:none; padding:0 2px; line-height:1;
  }
  .strikes{display:flex; gap:3px; align-items:center;}
  .strike{
    width:15px; height:15px; border-radius:4px; flex:none;
    display:flex; align-items:center; justify-content:center;
    font-size:10px; font-weight:800; color:var(--muted);
    background:rgba(20,21,31,.07); line-height:1;
  }
  [data-theme="dark"] .strike{background:rgba(241,240,248,.10);}
  .strike.filled{color:#fff; background:var(--coral);}
  .out-tag{
    font-size:8.5px; font-weight:800; letter-spacing:.03em; color:var(--coral);
    margin-left:1px; white-space:nowrap;
  }

  /* Name sits centered between the strikes and the stars. Tapping it cycles
     its pastel color -- no separate swatch button needed. */
  .name-wrap{
    flex:1; min-width:0; display:flex; justify-content:center; align-items:center; padding:0 2px;
  }
  .name-pill{
    font-family:var(--font-display); font-weight:700;
    font-size:calc(16px * var(--emoji-scale)); color:var(--ink);
    max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    padding:5px 14px; border-radius:999px; border:none;
    background:var(--pill-color, var(--card-bg-soft));
  }

  /* Stars: 5-wide, custom SVG icon (not emoji) styled to match the celebration
     cards -- rounded points, soft offset shadow (lighter than the border, not
     black). Sized to match the smiley face; spacing trimmed to fit more on screen. */
  .star-zone{display:flex; justify-content:flex-end; gap:0; align-items:center; flex:none;}
  .star-slot{
    position:relative; width:27px; height:30px; display:flex; align-items:center; justify-content:center;
    background:none; border:none; padding:0; opacity:.32;
  }
  .star-slot.filled{opacity:1;}
  .star-svg{width:100%; height:100%; display:block; overflow:visible;}
  .star-shadow{fill:var(--soft-shadow); stroke:var(--soft-shadow); stroke-width:2.2; stroke-linejoin:round;}
  .star-fill{fill:var(--muted); stroke:var(--border-color); stroke-width:2; stroke-linejoin:round; stroke-linecap:round;}
  .star-slot.filled .star-fill{fill:var(--gold); stroke-width:1.5;}
  .star-slot.badge{opacity:1; transform:scale(1.05); font-weight:800; font-size:14px;
    color:#fff; background:var(--gold); border-radius:50%; width:27px; height:27px;
    border:1.5px solid rgba(0,0,0,.25);}

  /* Skill icons: hidden by default everywhere. A single global ribbon toggle
     (not a per-row control) reveals this column for the whole roster at once. */
  .skill-zone{display:flex; align-items:center; justify-content:flex-end; gap:4px; flex:none;}
  .skill-chip{
    font-size:15px; background:none; border:none; opacity:.20; padding:2px; line-height:1;
  }
  .skill-chip.on{opacity:1;}

  /* Older-class progress star + glass-fill skill gauges */
  body.age-older .student-row{
    height:auto; min-height:48px; padding:6px 6px; gap:8px;
  }
  body.age-older .name-wrap{flex:0 1 auto; max-width:28%; justify-content:flex-start;}
  .star-zone.older-stars{
    flex:1; min-width:0; display:flex; align-items:center; gap:8px; justify-content:flex-end;
  }
  /* Shrink the star bar when skills are open so gauges can use the freed width */
  body.age-older.skills-open .star-zone.older-stars{flex:1 1 auto; max-width:80%;}
  @media(min-width:900px){
    body.age-older.skills-open .star-zone.older-stars{max-width:70%;}
  }
  .older-progress{
    flex:1; min-width:36px; height:14px; border-radius:999px; background:var(--track-line);
    overflow:hidden; border:1px solid var(--hairline); padding:0; cursor:pointer;
  }
  .older-progress > span{
    display:block; height:100%; background:var(--gold); border-radius:999px; width:0%;
  }
  .older-star-badge{
    flex:none; width:30px; height:30px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-display); font-weight:800; font-size:13px;
    color:var(--muted); background:rgba(20,21,31,.07);
    border:1.5px solid var(--hairline); padding:0; line-height:1;
  }
  .older-star-badge.has-star{
    color:#fff; background:var(--gold); border-color:rgba(0,0,0,.25);
  }
  [data-theme="dark"] .older-star-badge{background:rgba(241,240,248,.10);}
  .older-skills-wrap{display:flex; align-items:center; gap:6px; flex:none; min-width:0;}
  body.age-older.skills-open .older-skills-wrap{flex:1 1 auto;}
  .skill-zone.older-skills{gap:6px; max-width:none; justify-content:flex-end;}
  body.age-older.skills-open .skill-zone.older-skills{flex:1; gap:8px; min-width:0;}
  .older-gauge,
  .older-face-chip{
    position:relative; width:34px; height:34px; border-radius:10px;
    border:1px solid transparent; overflow:hidden; padding:0; flex:none;
    display:flex; align-items:center; justify-content:center;

<body data-theme="light">
<div id="app"></div>

<script>
(function(){
  "use strict";

  /* ---------------- utilities ---------------- */
  function uid(prefix){
    return (prefix||'id') + '_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,8);
  }
  function todayISO(){
    var d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }
  function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }

  /* Vibrant "rainbow" assigned per student row, cycling in order. Punchier
     than plain pastel so each name-pill reads clearly at a glance. */
  var PASTELS_LIGHT = [
    { bg:'#FFB3AA', swatch:'#FF9E98' },
    { bg:'#FFC98A', swatch:'#FFB86B' },
    { bg:'#F3E066', swatch:'#F0D24A' },
    { bg:'#A9E39B', swatch:'#79CC81' },
    { bg:'#98D3F5', swatch:'#6FB6EA' },
    { bg:'#CBAFF2', swatch:'#AF95EA' }
  ];
  var PASTELS_DARK = [
    { bg:'#5C2E3D', swatch:'#E27D7D' },
    { bg:'#5C4522', swatch:'#DDA85A' },
    { bg:'#585322', swatch:'#D3C34C' },
    { bg:'#294A26', swatch:'#5FBE6C' },
    { bg:'#234A66', swatch:'#5FA8DE' },
    { bg:'#42308A', swatch:'#9C7EE0' }
  ];
  function getPalette(){
    return document.body.getAttribute('data-theme') === 'dark' ? PASTELS_DARK : PASTELS_LIGHT;
  }
  function paletteSize(){ return PASTELS_LIGHT.length; }

  /* ---------------- storage layer ----------------
     Prefers window.storage (available inside the Claude artifact preview).
     Falls back to real localStorage when that API isn't present -- e.g. once
     this file is deployed/opened as a standalone PWA outside the preview --
     so classes actually persist in both contexts instead of silently no-oping. */
  var storageAvailable = (typeof window.storage !== 'undefined');
  var LS_PREFIX = 'classTracker::';

  async function storeGet(key){
    if(storageAvailable){
      try{
        var res = await window.storage.get(key, false);
        return res ? res.value : null;
      }catch(e){ /* fall through to localStorage */ }
    }
    try{ return window.localStorage.getItem(LS_PREFIX + key); }catch(e){ return null; }
  }
  async function storeSet(key, value){
    if(storageAvailable){
      try{
        var res = await window.storage.set(key, value, false);
        if(res) return true;
      }catch(e){ /* fall through to localStorage */ }
    }
    try{ window.localStorage.setItem(LS_PREFIX + key, value); return true; }catch(e){ return false; }
  }
  async function storeDelete(key){
    if(storageAvailable){
      try{ await window.storage.delete(key, false); }catch(e){ /* ignore */ }
    }
    try{ window.localStorage.removeItem(LS_PREFIX + key); }catch(e){ /* ignore */ }
    return true;
  }

  async function loadClassesIndex(){
    var raw = await storeGet('classes-index');
    if(!raw) return [];
    try{ return JSON.parse(raw); }catch(e){ return []; }
  }
  async function saveClassesIndex(list){
    await storeSet('classes-index', JSON.stringify(list));
  }
  async function loadRoster(classId){
    var raw = await storeGet('class-roster:' + classId);
    if(!raw) return null;
    try{ return JSON.parse(raw); }catch(e){ return null; }
  }
  async function saveRoster(classId, roster){
    await storeSet('class-roster:' + classId, JSON.stringify(roster));
  }
  async function deleteClassData(classId){
    await storeDelete('class-roster:' + classId);
    await storeDelete('reports:' + classId);
  }
  async function loadReports(classId){
    var raw = await storeGet('reports:' + classId);
    if(!raw) return [];
    try{ return JSON.parse(raw); }catch(e){ return []; }
  }
  async function appendReport(classId, report){
    var list = await loadReports(classId);
    list.push(report);
    await storeSet('reports:' + classId, JSON.stringify(list));
  }
  async function loadActiveClassId(){
    return await storeGet('active-class-id');
  }
  async function saveActiveClassId(classId){
    await storeSet('active-class-id', classId);
  }
  async function clearActiveClassId(){
    await storeDelete('active-class-id');
  }

  /* ---------------- app state ---------------- */
  var state = {
    screen: 'home',
    theme: 'light',
    classesIndex: [],
    editingClassId: null,
    managingClassId: null,
    managingRoster: null,
    manageMode: null, // 'start' | 'edit'
    currentClass: null   // { id, className, ageGroup, students:[...] }
  };

  var root = document.getElementById('app');

  var RANGE_STEPS = [50, 75, 100];
  var QUALITY_LEVELS = [2, 3, 4];
  var QUALITY_LABELS = { 2:'Fair', 3:'Good', 4:'Excellent' };
  var LMS_LEVELS = [1, 2, 3, 4];
  var LMS_LABELS = { 1:'Poor', 2:'Fair', 3:'Good', 4:'Excellent' };
  var OLDER_RANGE_KEYS = ['vocabulary', 'understanding', 'interaction'];
  var STAR_MILESTONE = 5;

  function normalizeLmsScore(value){
    var n = Number(value);
    if(LMS_LEVELS.indexOf(n) >= 0) return n;
    return 2;
  }

  function stepLmsScore(value){
    var idx = LMS_LEVELS.indexOf(normalizeLmsScore(value));
    if(idx < 0) idx = 1;
    return LMS_LEVELS[(idx + 1) % LMS_LEVELS.length];
  }

  function lmsLabel(value){
    return LMS_LABELS[normalizeLmsScore(value)];
  }

  function defaultHomework(){
    return { complete:2, effort:2, quality:2 };
  }

  function ensureHomework(s){
    if(!s.homework || typeof s.homework !== 'object') s.homework = defaultHomework();
    s.homework.complete = normalizeLmsScore(s.homework.complete);
    s.homework.effort = normalizeLmsScore(s.homework.effort);
    s.homework.quality = normalizeLmsScore(s.homework.quality);
    delete s.homework.status;
    return s.homework;
  }

  function isOlderClass(cls){
    return !!(cls && cls.ageGroup === 'older');
  }

  function defaultSkillsOlder(){
    return { vocabulary:50, understanding:50, quality:3, interaction:50 };
  }

  function normalizeRangePct(v){
    var n = Number(v);
    if(n >= 100) return 100;
    if(n >= 75) return 75;
    return 50;
  }

  function normalizeQuality(v){
    var n = Number(v);
    if(n === 2 || n === 4) return n;
    return 3;
  }

  function ensureSkillsOlder(s){
    if(!s.skillsOlder) s.skillsOlder = defaultSkillsOlder();
    s.skillsOlder.vocabulary = normalizeRangePct(s.skillsOlder.vocabulary);
    s.skillsOlder.understanding = normalizeRangePct(s.skillsOlder.understanding);
    s.skillsOlder.interaction = normalizeRangePct(s.skillsOlder.interaction);
    s.skillsOlder.quality = normalizeQuality(s.skillsOlder.quality);
    return s.skillsOlder;
  }

  function stepRange(value, dir){
    var idx = RANGE_STEPS.indexOf(normalizeRangePct(value));
    if(idx < 0) idx = 0;
    return RANGE_STEPS[clamp(idx + dir, 0, RANGE_STEPS.length - 1)];
  }

  function cycleRange(value){
    var idx = RANGE_STEPS.indexOf(normalizeRangePct(value));
    if(idx < 0) idx = 0;
    return RANGE_STEPS[(idx + 1) % RANGE_STEPS.length];
  }

  function cycleQuality(value){
    var idx = QUALITY_LEVELS.indexOf(normalizeQuality(value));
    if(idx < 0) idx = 1;
    return QUALITY_LEVELS[(idx + 1) % QUALITY_LEVELS.length];
  }

  function stepQuality(value, dir){
    var idx = QUALITY_LEVELS.indexOf(normalizeQuality(value));
    if(idx < 0) idx = 1;
    return QUALITY_LEVELS[clamp(idx + dir, 0, QUALITY_LEVELS.length - 1)];
  }

  function makeStudent(name, index){
    return {
      id: uid('stu'),
      name: name,
      positive: 0,
      negative: 0,
      absent: false,
      homework: defaultHomework(),
      colorIndex: (index || 0) % paletteSize(),
      skills: { songs:false, stories:false, phonics:false, blending:false },
      skillsOlder: defaultSkillsOlder()
    };
  }

  function presentStudents(cls){
    return (cls && cls.students ? cls.students : []).filter(function(s){ return !s.absent; });
  }

  function normalizeName(name){
    return String(name || '').trim().toLowerCase();
  }

  function buildStudentsFromNames(rawNames, existingRoster){
    var existingByName = {};
    if(existingRoster && existingRoster.students){
      existingRoster.students.forEach(function(s){
        var key = normalizeName(s.name);
        if(!existingByName[key]) existingByName[key] = [];
        existingByName[key].push(s);
      });
    }

    return rawNames.map(function(name, index){
      var key = normalizeName(name);
      var previous = existingByName[key] && existingByName[key].shift();
      var student = makeStudent(name, index);
      if(previous){
        student.id = previous.id || student.id;
        student.colorIndex = (typeof previous.colorIndex === 'number') ? previous.colorIndex : student.colorIndex;
        student.absent = !!previous.absent;
        if(previous.homework){
          student.homework = {
            complete: normalizeLmsScore(previous.homework.complete),
            effort: normalizeLmsScore(previous.homework.effort),
            quality: normalizeLmsScore(previous.homework.quality)
          };
        }
        if(previous.skillsOlder){
          student.skillsOlder = {
            vocabulary: normalizeRangePct(previous.skillsOlder.vocabulary),
            understanding: normalizeRangePct(previous.skillsOlder.understanding),
            interaction: normalizeRangePct(previous.skillsOlder.interaction),
            quality: normalizeQuality(previous.skillsOlder.quality)
          };
        }
      }
      return student;
    });
  }

  function prepareRosterForUse(roster){
    if(!roster || !roster.students) return roster;
    var older = isOlderClass(roster);
    roster.students.forEach(function(s, i){
      if(typeof s.positive !== 'number') s.positive = 0;
      if(typeof s.negative !== 'number') s.negative = 0;
      if(typeof s.absent !== 'boolean') s.absent = false;
      ensureHomework(s);
      if(!s.skills) s.skills = { songs:false, stories:false, phonics:false, blending:false };
      if(typeof s.colorIndex !== 'number') s.colorIndex = i % paletteSize();
      if(older) ensureSkillsOlder(s);
      delete s.expanded;
    });
    if(typeof roster.negativeEnabled !== 'boolean'){
      roster.negativeEnabled = older ? false : true;
    }
    return roster;
  }

  // Whether the shared skill-icon column is currently shown for the whole roster.
  // Transient (not persisted) -- it always starts collapsed, which keeps the
  // student-facing grid down to just name + strikes + stars by default.
  var uiSkillsVisible = false;

  // Whether the achievements strip is collapsed. Transient, starts expanded.
  var uiCelebrationCollapsed = false;

  // Bulk skill toolbar accordion (only relevant while skills are visible).
  // Starts collapsed so student values can show without the bulk button clutter.
  var uiSkillsBulkCollapsed = true;

  /* ---------------- toast ---------------- */
  var toastTimer = null;
  function showToast(msg){
    var el = document.querySelector('.toast');
    if(el) el.remove();
    el = document.createElement('div');
    el.className = 'toast';
    el.textContent = msg;
    document.body.appendChild(el);
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ el.remove(); }, 2200);
  }

  /* ---------------- init ---------------- */
  async function init(){
    var savedTheme = await storeGet('ui-theme');
    state.theme = (savedTheme === 'dark') ? 'dark' : 'light';
    document.body.setAttribute('data-theme', state.theme);
    state.classesIndex = await loadClassesIndex();
    var activeClassId = await loadActiveClassId();
    if(activeClassId){
      var activeRoster = prepareRosterForUse(await loadRoster(activeClassId));
      if(activeRoster){
        state.currentClass = activeRoster;
        uiSkillsVisible = false;
        renderTracker();
        return;
      }
      await clearActiveClassId();
    }
    renderHome();
  }

  function toggleTheme(){
    state.theme = (state.theme === 'light') ? 'dark' : 'light';
    document.body.setAttribute('data-theme', state.theme);
    storeSet('ui-theme', state.theme);
    if(state.screen === 'tracker') renderTracker();
    else if(state.screen === 'manage') renderClassManage();
    else renderHome();
  }

  /* =========================================================
     HOME SCREEN
     ========================================================= */
  function renderHome(){
    state.screen = 'home';
    state.editingClassId = null;
    var atLimit = state.classesIndex.length >= 15;
    var activeSessionHtml = state.currentClass ?
      '<button class="start-btn resume-btn" id="resumeBtn">↩ Resume ' + escapeHtml(state.currentClass.className) + '</button>'
      : '';

    var cardsHtml = '';
    if(state.classesIndex.length === 0){
      cardsHtml = '<div class="empty-state">No saved classes yet...</div>';
    } else {
      cardsHtml = '<div class="saved-grid">' + state.classesIndex.map(function(c){
        var emoji = c.ageGroup === 'kindergarten' ? '🧸' : '🎒';
        return '' +
        '<div class="class-card" data-open="' + c.id + '">' +
          '<button type="button" class="cc-del" data-del="' + c.id + '" title="Delete class">✕</button>' +
          '<span class="cc-name">' + emoji + ' ' + escapeHtml(c.className) + '</span>' +
          '<span class="cc-meta">' + c.studentCount + ' students</span>' +
          '<button type="button" class="cc-manage" data-manage="' + c.id + '">Manage</button>' +
        '</div>';
      }).join('') + '</div>';
    }

    root.innerHTML =
    '<div id="home-screen">' +
      '<div class="home-inner">' +
        '<div class="home-hero">' +
          '<span class="mark">🐱‍👤</span>' +
          '<div><h1>Class Behavior &amp; Skill Tracker</h1>' +
          '<p>Quick-tap scoring for songs, stories, phonics &amp; blending.</p></div>' +
        '</div>' +

        activeSessionHtml +

        '<div class="field-block">' +
          '<label class="field-label" for="classNameInput">Class name</label>' +
          '<input id="classNameInput" type="text" placeholder="e.g. Kindergarten - Section A" maxlength="60">' +
        '</div>' +

        '<div class="field-block">' +
          '<label class="field-label" for="studentNamesInput">Student names (one per line)</label>' +
          '<textarea id="studentNamesInput" placeholder="Alex Johnson&#10;Ben Smith&#10;Chloe Davis"></textarea>' +
        '</div>' +

        '<div class="field-block">' +
          '<label class="field-label">Age bracket</label>' +
          '<div class="age-toggle">' +
            '<button class="age-btn active" data-age="kindergarten">🧸 Kindergarten</button>' +
            '<button class="age-btn" data-age="older">🎒 Older Class</button>' +
          '</div>' +
        '</div>' +

        '<button class="start-btn" id="startBtn"' + (atLimit ? ' disabled' : '') + '>🚀 Start Tracking</button>' +
        (atLimit ? '<div class="limit-note">You\'ve reached the 15 saved class limit — delete one below to add a new class.</div>' : '') +

        '<div class="saved-heading">📚 Saved Classes</div>' +
        cardsHtml +
      '</div>' +
    '</div>';

    // age toggle behavior
    var ageBtns = root.querySelectorAll('.age-btn');
    var selectedAge = 'kindergarten';
    ageBtns.forEach(function(btn){
      btn.addEventListener('click', function(){
        ageBtns.forEach(function(b){ b.classList.remove('active'); });
        btn.classList.add('active');
        selectedAge = btn.getAttribute('data-age');
      });
    });

    var startBtn = document.getElementById('startBtn');
    if(startBtn){
      startBtn.addEventListener('click', function(){
        var activeAge = root.querySelector('.age-btn.active');
        startTracking(activeAge ? activeAge.getAttribute('data-age') : selectedAge);
      });
    }
    var resumeBtn = document.getElementById('resumeBtn');
    if(resumeBtn){
      resumeBtn.addEventListener('click', function(){
        renderTracker();
      });
    }

    root.querySelectorAll('[data-open]').forEach(function(el){
      el.addEventListener('click', function(e){
        if(e.target.closest('[data-del]') || e.target.closest('[data-manage]')) return;
        loadClassIntoForm(el.getAttribute('data-open'));
      });
    });
    root.querySelectorAll('[data-del]').forEach(function(el){
      el.addEventListener('click', function(e){
        e.stopPropagation();
        confirmDeleteClass(el.getAttribute('data-del'));
      });
    });
    root.querySelectorAll('[data-manage]').forEach(function(el){
      el.addEventListener('click', function(e){
        e.stopPropagation();
        openClassManage(el.getAttribute('data-manage'));
      });
    });
  }

  /* =========================================================
     CLASS MANAGE SCREEN
     ========================================================= */
  async function syncIndexStudentCount(classId, count){
    var changed = false;
    state.classesIndex = state.classesIndex.map(function(c){
      if(c.id !== classId) return c;
      if(c.studentCount === count) return c;
      changed = true;
      return Object.assign({}, c, { studentCount: count });
    });
    if(changed) await saveClassesIndex(state.classesIndex);
  }

  async function persistManagedRoster(){
    var roster = state.managingRoster;
    if(!roster) return;
    prepareRosterForUse(roster);
    await saveRoster(roster.id, roster);
    await syncIndexStudentCount(roster.id, roster.students.length);
    if(state.currentClass && state.currentClass.id === roster.id){
      state.currentClass = roster;
    }
  }

  async function openClassManage(id, mode){
    var roster = prepareRosterForUse(await loadRoster(id));
    if(!roster){ showToast('Class not found.'); return; }
    state.managingClassId = id;
    state.managingRoster = roster;
    state.manageMode = mode === 'start' ? 'start' : 'edit';
    renderClassManage();
  }

  function openStartOfClass(roster){
    state.managingClassId = roster.id;
    state.managingRoster = roster;
    state.manageMode = 'start';
    if(state.currentClass && state.currentClass.id === roster.id){
      state.currentClass = roster;
    }
    renderClassManage();
  }

  function manageRowHtml(s){
    var absent = !!s.absent;
    var hw = ensureHomework(s);
    var palette = getPalette();
    var colorIndex = (s.colorIndex || 0) % palette.length;
    var pillColor = palette[colorIndex];
    var pillStyle = 'style="--pill-color:' + pillColor.bg + ';"';

    function cycleBtn(key, value){
      var score = normalizeLmsScore(value);
      return '<button type="button" class="manage-chip score-' + score +
        '" data-hw-cycle="' + key + '" data-stu="' + s.id + '" title="' +
        key.charAt(0).toUpperCase() + key.slice(1) + '">' + lmsLabel(score) + '</button>';
    }

    return '' +
      '<div class="manage-row' + (absent ? ' is-absent' : '') + '" data-stu="' + s.id + '">' +
        '<div class="name-wrap">' +
          '<button type="button" class="name-pill" data-manage-color="' + s.id + '" ' + pillStyle +
            ' title="Tap to change color">' + escapeHtml(s.name) + '</button>' +
        '</div>' +
        '<button type="button" class="manage-chip tone-attend ' + (absent ? 'tone-absent' : 'tone-present') +
          '" data-attend-cycle="' + s.id + '" title="Tap to toggle attendance">' +
          (absent ? 'Absent' : 'Present') + '</button>' +
        cycleBtn('complete', hw.complete) +
        cycleBtn('effort', hw.effort) +
        cycleBtn('quality', hw.quality) +
        '<button type="button" class="manage-remove" data-remove="' + s.id + '">✕</button>' +
      '</div>';
  }

  function renderClassManage(){
    var roster = state.managingRoster;
    if(!roster){ renderHome(); return; }
    state.screen = 'manage';
    document.body.classList.remove('age-kg', 'age-older', 'skills-open');
    var isStart = state.manageMode === 'start';

    var rowsHtml = '';
    if(!roster.students.length){
      rowsHtml = '<div class="manage-empty">No students yet — add one below.</div>';
    } else {
      rowsHtml =
        '<div class="manage-col-headers" aria-hidden="true">' +
          '<span class="mch-name">Name</span>' +
          '<span>Present</span>' +
          '<span>Complete</span>' +
          '<span>Effort</span>' +
          '<span>Quality</span>' +
          '<span></span>' +
        '</div>' +
        '<div class="manage-list">' + roster.students.map(manageRowHtml).join('') + '</div>';
    }

    root.innerHTML =
    '<div id="manage-screen">' +
      '<div class="manage-header">' +
        '<button class="icon-btn" id="manageBackBtn" title="Back">←</button>' +
        '<div class="manage-title">' + (isStart ? 'Start of class · ' : 'Manage · ') + escapeHtml(roster.className) + '</div>' +
        '<div class="header-actions" style="width:34px"></div>' +
      '</div>' +
      (isStart ? '<div class="manage-hint">Mark who is present, set homework Complete / Effort / Quality, then continue.</div>' : '') +
      '<div class="manage-body">' +
        rowsHtml +
        '<div class="manage-add">' +
          '<input id="manageAddInput" type="text" placeholder="New student name" maxlength="60" autocomplete="off">' +
          '<button type="button" id="manageAddBtn">Add</button>' +
        '</div>' +
      '</div>' +
      (isStart ?
        '<div class="manage-footer">' +
          '<button type="button" class="manage-continue" id="manageContinueBtn">Continue to tracker</button>' +
        '</div>'
      : '') +
    '</div>';

    document.getElementById('manageBackBtn').addEventListener('click', function(){
      state.managingClassId = null;
      state.managingRoster = null;
      state.manageMode = null;
      renderHome();
    });

    var continueBtn = document.getElementById('manageContinueBtn');
    if(continueBtn){
      continueBtn.addEventListener('click', async function(){
        await persistManagedRoster();
        state.currentClass = state.managingRoster;
        await saveActiveClassId(state.currentClass.id);
        state.managingClassId = null;
        state.managingRoster = null;
        state.manageMode = null;
        uiSkillsVisible = false;
        renderTracker();
      });
    }

    root.querySelectorAll('[data-manage-color]').forEach(function(btn){
      btn.addEventListener('click', async function(){
        var student = roster.students.find(function(s){ return s.id === btn.getAttribute('data-manage-color'); });
        if(!student) return;
        student.colorIndex = ((student.colorIndex || 0) + 1) % paletteSize();
        await persistManagedRoster();
        renderClassManage();
      });
    });

    root.querySelectorAll('[data-attend-cycle]').forEach(function(btn){
      btn.addEventListener('click', async function(){
        var student = roster.students.find(function(s){ return s.id === btn.getAttribute('data-attend-cycle'); });
        if(!student) return;
        student.absent = !student.absent;
        await persistManagedRoster();
        renderClassManage();
      });
    });

    root.querySelectorAll('[data-hw-cycle]').forEach(function(btn){
      btn.addEventListener('click', async function(){
        var student = roster.students.find(function(s){ return s.id === btn.getAttribute('data-stu'); });
        if(!student) return;
        var hw = ensureHomework(student);
        var key = btn.getAttribute('data-hw-cycle');
        if(key !== 'complete' && key !== 'effort' && key !== 'quality') return;
        hw[key] = stepLmsScore(hw[key]);
        await persistManagedRoster();
        renderClassManage();
      });
    });

    root.querySelectorAll('[data-remove]').forEach(function(btn){
      btn.addEventListener('click', async function(){
        var stuId = btn.getAttribute('data-remove');
        var student = roster.students.find(function(s){ return s.id === stuId; });
        if(!student) return;
        if(!window.confirm('Permanently remove ' + student.name + ' from this class?')) return;
        roster.students = roster.students.filter(function(s){ return s.id !== stuId; });
        await persistManagedRoster();
        renderClassManage();
        showToast(student.name + ' removed.');
      });
    });

    function addManagedStudent(){
      var input = document.getElementById('manageAddInput');
      var name = String(input && input.value || '').trim();
      if(!name){ showToast('Enter a student name.'); return; }
      roster.students.push(makeStudent(name, roster.students.length));
      persistManagedRoster().then(function(){
        renderClassManage();
        showToast(name + ' added.');
      });
    }

    document.getElementById('manageAddBtn').addEventListener('click', addManagedStudent);
    document.getElementById('manageAddInput').addEventListener('keydown', function(e){
      if(e.key === 'Enter'){
        e.preventDefault();
        addManagedStudent();
      }
    });
  }

  async function startTracking(ageGroup){
    var nameInput = document.getElementById('classNameInput');
    var namesArea = document.getElementById('studentNamesInput');
    var className = nameInput.value.trim();
    var rawNames = namesArea.value.split('\n').map(function(s){ return s.trim(); }).filter(Boolean);
    var editingId = state.editingClassId;

    if(!className){ showToast('Give the class a name first.'); nameInput.focus(); return; }
    if(rawNames.length === 0){ showToast('Paste at least one student name.'); namesArea.focus(); return; }
    if(!editingId && state.classesIndex.length >= 15){ showToast('15 class limit reached — delete one first.'); return; }

    var existingRoster = editingId ? await loadRoster(editingId) : null;
    var id = editingId || uid('cls');
    var students = buildStudentsFromNames(rawNames, existingRoster);
    var older = ageGroup === 'older';
    if(older){
      students.forEach(function(s){ ensureSkillsOlder(s); });
    }
    var defaultNeg = older ? false : true;
    var classObj = {
      id: id,
      className: className,
      ageGroup: ageGroup,
      students: students,
      negativeEnabled: existingRoster && typeof existingRoster.negativeEnabled === 'boolean' ? existingRoster.negativeEnabled : defaultNeg
    };

    await saveRoster(id, classObj);
    if(editingId){
      state.classesIndex = state.classesIndex.map(function(c){
        if(c.id !== editingId) return c;
        return {
          id: id,
          className: className,
          ageGroup: ageGroup,
          studentCount: students.length,
          dateCreated: c.dateCreated || new Date().toISOString()
        };
      });
    } else {
      state.classesIndex.push({ id:id, className:className, ageGroup:ageGroup, studentCount:students.length, dateCreated:new Date().toISOString() });
    }
    await saveClassesIndex(state.classesIndex);

    state.editingClassId = null;
    uiSkillsVisible = false;
    state.currentClass = classObj;
    await saveActiveClassId(id);
    openStartOfClass(classObj);
  }

  async function loadClassIntoForm(id){
    var roster = prepareRosterForUse(await loadRoster(id));
    if(!roster){ showToast('Could not load that class.'); return; }

    state.editingClassId = id;
    var nameInput = document.getElementById('classNameInput');
    var namesArea = document.getElementById('studentNamesInput');
    var startBtn = document.getElementById('startBtn');
    var ageBtns = root.querySelectorAll('.age-btn');

    nameInput.value = roster.className || '';
    namesArea.value = roster.students.map(function(s){ return s.name; }).join('\n');
    var ageGroup = roster.ageGroup === 'older' ? 'older' : 'kindergarten';
    ageBtns.forEach(function(btn){
      btn.classList.toggle('active', btn.getAttribute('data-age') === ageGroup);
    });
    if(startBtn){
      startBtn.disabled = false;
      startBtn.textContent = '🚀 Start Tracking';
    }
    nameInput.focus();
    showToast('Class loaded — edit the roster, then start tracking.');
  }

  function confirmDeleteClass(id){
    var entry = state.classesIndex.find(function(c){ return c.id === id; });
    var label = entry ? entry.className : 'this class';
    if(!window.confirm('Delete "' + label + '" and all of its saved data? This cannot be undone.')) return;
    if(state.currentClass && state.currentClass.id === id) state.currentClass = null;
    loadActiveClassId().then(function(activeId){
      if(activeId === id) clearActiveClassId();
    });
    state.classesIndex = state.classesIndex.filter(function(c){ return c.id !== id; });
    saveClassesIndex(state.classesIndex);
    deleteClassData(id);
    renderHome();
  }

  /* =========================================================
     TRACKER SCREEN
     ========================================================= */
  function goHome(){
    renderHome();
  }

  function persistCurrent(){
    if(state.currentClass){
      saveRoster(state.currentClass.id, state.currentClass);
      saveActiveClassId(state.currentClass.id);
    }
  }

  function rangeToLevel(pct){
    var n = normalizeRangePct(pct);
    if(n >= 100) return 4;
    if(n >= 75) return 3;
    return 2;
  }

  // Older skill gauges are three steps: Fair/Good/Excellent → show 1 / 2 / 3.
  function lmsLevelToStep(level){
    var n = Number(level);
    if(n >= 4) return 3;
    if(n >= 3) return 2;
    return 1;
  }

  function olderGaugeHtml(level, attrs, title){
    var step = lmsLevelToStep(level);
    return '' +
      '<button class="older-gauge" data-level="' + level + '" data-step="' + step + '" ' + attrs + ' title="' + title + '">' +
        '<span class="older-gauge-num">' + step + '</span>' +
      '</button>';
  }

    return '' +
      '<div class="skills-subrow older-bulk">' +
        '<button class="rbtn skill" data-bulk-range="vocabulary" data-dir="1" title="Raise Vocabulary for everyone">Vocab +</button>' +
        '<button class="rbtn skill" data-bulk-range="vocabulary" data-dir="-1" title="Lower Vocabulary for everyone">Vocab −</button>' +
        '<button class="rbtn skill" data-bulk-range="understanding" data-dir="1" title="Raise Understanding for everyone">Und +</button>' +
        '<button class="rbtn skill" data-bulk-range="understanding" data-dir="-1" title="Lower Understanding for everyone">Und −</button>' +
        '<button class="rbtn skill" data-bulk-quality="1" data-dir="1" title="Raise Quality for everyone">Qual +</button>' +
        '<button class="rbtn skill" data-bulk-quality="1" data-dir="-1" title="Lower Quality for everyone">Qual −</button>' +
        '<button class="rbtn skill" data-bulk-range="interaction" data-dir="1" title="Raise Active for everyone">Active +</button>' +
        '<button class="rbtn skill" data-bulk-range="interaction" data-dir="-1" title="Lower Active for everyone">Active −</button>' +
        '<button class="rbtn skill" data-bulk="neg+" title="Worse discipline for everyone">Disc +</button>' +
        '<button class="rbtn skill" data-bulk="neg-" title="Better discipline for everyone">Disc −</button>' +

      return '<span class="och-skill"><span class="lbl-full">' + full + '</span><span class="lbl-abbr">' + abbr + '</span></span>';

        '</div>' +
        '<div class="older-skills-wrap">' +
          '<div class="skill-zone older-skills">' +
            skillLabel('Vocabulary', 'Voc') +

            skillLabel('Active', 'Act') +
            skillLabel('Discipline', 'Disc') +
          '</div>' +

  function kgBulkButtonsHtml(){
    return '' +
      '<div class="skills-subrow">' +
        '<button class="rbtn skill" data-bulk-skill="songs" title="Set Songs &amp; Chants for everyone">🎵</button>' +
        '<button class="rbtn skill" data-bulk-skill="stories" title="Set Stories &amp; Chants for everyone">📖</button>' +
        '<button class="rbtn skill" data-bulk-skill="phonics" title="Set Phonics for everyone">🔤</button>' +
        '<button class="rbtn skill" data-bulk-skill="blending" title="Set Blending for everyone">🗣️</button>' +
      '</div>';

  function skillsPanelHtml(older){
    if(!uiSkillsVisible) return '';
    var bulk = older ? olderBulkButtonsHtml() : kgBulkButtonsHtml();
    return '' +
      '<div class="skills-bulk-pane">' +
        '<button type="button" class="cel-toggle" id="toggleSkillsBulkBtn">' +
          (uiSkillsBulkCollapsed ? '▸ Bulk actions' : '▾ Bulk actions') +
        '</button>' +
        (uiSkillsBulkCollapsed ? '' : bulk) +
      '</div>';

  function renderTracker(){
    state.screen = 'tracker';
    var cls = state.currentClass;
    var older = isOlderClass(cls);
    document.body.classList.toggle('age-kg', cls.ageGroup === 'kindergarten');
    document.body.classList.toggle('age-older', older);
    document.body.style.setProperty('--emoji-scale', cls.ageGroup === 'kindergarten' ? '1.08' : '0.94');
    document.body.classList.toggle('skills-open', uiSkillsVisible);

    if(typeof cls.negativeEnabled !== 'boolean') cls.negativeEnabled = older ? false : true;
    if(older) presentStudents(cls).forEach(ensureSkillsOlder);

    var SUN_ICON = '<svg class="theme-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"></circle><line x1="12" y1="2" x2="12" y2="4"></line><line x1="12" y1="20" x2="12" y2="22"></line><line x1="4" y1="12" x2="2" y2="12"></line><line x1="22" y1="12" x2="20" y2="12"></line><line x1="4.9" y1="4.9" x2="3.5" y2="3.5"></line><line x1="20.5" y1="20.5" x2="19.1" y2="19.1"></line><line x1="4.9" y1="19.1" x2="3.5" y2="20.5"></line><line x1="20.5" y1="3.5" x2="19.1" y2="4.9"></line></svg>';
    var MOON_ICON = '<svg class="theme-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"></path></svg>';
    var STAR_OUTLINE = '<svg class="ribbon-star" viewBox="0 0 26 26"><use href="#starPath"></use></svg>';

    // Older: never use the left discipline column — face lives at end of each row.
    var showLeftNeg = !older && !!cls.negativeEnabled;
    var rowsHtml = presentStudents(cls).map(function(s){ return rowTemplate(s, showLeftNeg, older); }).join('');
    var rosterHtml = (older && uiSkillsVisible ? olderColHeadersHtml() : '') + rowsHtml;

    var leftBulk = (!older && cls.negativeEnabled) ?
      '<div class="ribbon-group">' +
        '<button class="rbtn" data-bulk="neg+"> :( +1</button>' +
        '<button class="rbtn" data-bulk="neg-"> :( −1</button>' +
      '</div>'
    : '<div class="ribbon-group"></div>';

    var centerRibbon = older
      ? '<div class="ribbon-center">' +
          '<button class="rbtn skills-vis' + (uiSkillsVisible ? ' on' : '') + '" id="toggleSkillsBtn">Toggle Skills</button>' +
        '</div>'
      : '<div class="ribbon-center">' +
          '<button class="rbtn skills-vis' + (uiSkillsVisible ? ' on' : '') + '" id="toggleSkillsBtn">Toggle Skills</button>' +
          '<button class="rbtn behavior-toggle' + (cls.negativeEnabled ? '' : ' off') + '" id="toggleBehaviorBtn" title="Permanently show/hide negative behavior tracking for this class">' +
            (cls.negativeEnabled ? 'Behavior: On' : 'Behavior: Off') +
          '</button>' +
        '</div>';

    root.innerHTML =
    '<div id="tracker-screen">' +
      '<svg width="0" height="0" style="position:absolute;overflow:hidden" aria-hidden="true">' +
        '<defs><path id="starPath" d="M12 2 L14.9 8.6 L22 9.3 L16.8 14.1 L18.2 21 L12 17.4 L5.8 21 L7.2 14.1 L2 9.3 L9.1 8.6 Z"></path></defs>' +
      '</svg>' +
      '<div class="tracker-header">' +
        '<button class="icon-btn" id="backBtn" title="Back">←</button>' +
        '<div class="tracker-title">' + escapeHtml(cls.className) + '</div>' +
        '<div class="header-actions">' +
          '<button class="icon-btn" id="themeBtn" title="Toggle theme">' + (state.theme==='light' ? MOON_ICON : SUN_ICON) + '</button>' +
        '</div>' +
      '</div>' +

      '<div class="bulk-ribbon">' +
        leftBulk +
        centerRibbon +
        '<div class="ribbon-group">' +
          '<button class="rbtn" data-bulk="pos+">' + STAR_OUTLINE + ' +1</button>' +
          '<button class="rbtn" data-bulk="pos-">' + STAR_OUTLINE + ' −1</button>' +
        '</div>' +
      '</div>' +

  function olderStarsHtml(s){
    // After the first full star (5), keep the bar full; only the badge number grows.
    var progress = s.positive >= STAR_MILESTONE
      ? 100
      : ((s.positive % STAR_MILESTONE) / STAR_MILESTONE) * 100;
    var countLabel = s.positive > 99 ? '99+' : String(s.positive);
    return '' +
      '<div class="star-zone older-stars">' +
        '<button class="older-progress" data-older-star="sub" data-stu="' + s.id + '" title="Remove participation">' +
          '<span style="width:' + progress + '%"></span>' +
        '</button>' +
        '<button class="older-star-badge' + (s.positive > 0 ? ' has-star' : '') + '" data-older-star="add" data-stu="' + s.id + '" title="Add participation">' +
          countLabel +
        '</button>' +
      '</div>';
  }

  function kgStarsHtml(s){
    var STAR_ICON_SVG = '<svg class="star-svg" viewBox="0 0 26 26"><use href="#starPath" class="star-shadow" x="2" y="2"></use><use href="#starPath" class="star-fill"></use></svg>';
    if(s.positive < 5){
      return [0,1,2,3,4].map(function(i){
        return '<button class="star-slot' + (s.positive > i ? ' filled' : '') + '" data-star="' + i + '" data-stu="' + s.id + '">' + STAR_ICON_SVG + '</button>';
      }).join('');
    }
    return [0,1,2,3].map(function(i){
      return '<button class="star-slot filled" data-star="' + i + '" data-stu="' + s.id + '">' + STAR_ICON_SVG + '</button>';
    }).join('') +
    '<button class="star-slot badge" data-star="4" data-stu="' + s.id + '">' + (s.positive > 99 ? '99+' : s.positive) + '</button>';
  }

  function olderSkillZoneHtml(s){
    var so = ensureSkillsOlder(s);
    return '' +
      '<div class="skill-zone older-skills">' +
        olderGaugeHtml(rangeToLevel(so.vocabulary), 'data-older-range="vocabulary" data-stu="' + s.id + '"', 'Vocabulary') +
        olderGaugeHtml(rangeToLevel(so.understanding), 'data-older-range="understanding" data-stu="' + s.id + '"', 'Understanding') +
        olderGaugeHtml(normalizeQuality(so.quality), 'data-older-quality="1" data-stu="' + s.id + '"', 'Quality') +
        olderGaugeHtml(rangeToLevel(so.interaction), 'data-older-range="interaction" data-stu="' + s.id + '"', 'Active') +
        olderDisciplineHtml(s) +

  function olderDisciplineHtml(s){
    var disc = clamp(s.negative, 0, 3);
    return '<button class="older-face-chip" data-disc="' + disc + '" data-older-face="' + s.id +
      '" title="Discipline — tap to cycle">:(</button>';
  }

  function rowTemplate(s, negativeEnabled, older){
    var faces = ['😊','😐','🙁','😢'];
    var face = faces[clamp(s.negative,0,3)];
    var maxedOut = s.negative >= 3;

    var strikesHtml = [0,1,2].map(function(i){
      return '<span class="strike' + (i < s.negative ? ' filled' : '') + '">✕</span>';
    }).join('');

    var negZoneHtml = '';
    if(negativeEnabled && !older){
      negZoneHtml =
        '<div class="neg-zone' + (maxedOut ? ' maxed' : '') + '">' +
          '<button class="face-btn" data-face="' + s.id + '" title="Tap for a behavior mark">' + face + '</button>' +
          '<div class="strikes" data-dots="' + s.id + '" title="Tap a mark to remove it">' + strikesHtml + '</div>' +
          (maxedOut ? '<span class="out-tag">OUT</span>' : '') +
        '</div>';
    }

    var starsHtml = older ? olderStarsHtml(s) : ('<div class="star-zone">' + kgStarsHtml(s) + '</div>');

    var skillZoneHtml = '';
    if(older){
      if(uiSkillsVisible){
        skillZoneHtml = '<div class="older-skills-wrap">' + olderSkillZoneHtml(s) + '</div>';
      } else {
        skillZoneHtml = '<div class="older-skills-wrap">' + olderDisciplineHtml(s) + '</div>';
      }
    } else if(uiSkillsVisible){
      var skillDefs = [
        {k:'songs', icon:'🎵'}, {k:'stories', icon:'📖'}, {k:'phonics', icon:'🔤'}, {k:'blending', icon:'🗣️'}
      ];
      var skillsHtml = skillDefs.map(function(d){
        return '<button class="skill-chip' + (s.skills[d.k] ? ' on' : '') + '" data-skill="' + d.k + '" data-stu="' + s.id + '">' + d.icon + '</button>';
      }).join('');
      skillZoneHtml = '<div class="skill-zone">' + skillsHtml + '</div>';
    }

    var palette = getPalette();
    var colorIndex = (s.colorIndex || 0) % palette.length;
    var pillColor = palette[colorIndex];
    var pillStyle = 'style="--pill-color:' + pillColor.bg + ';"';

    return '' +
    '<div class="student-row" data-row="' + s.id + '">' +
      negZoneHtml +
      '<div class="name-wrap">' +
        '<button class="name-pill" data-namecolor="' + s.id + '" ' + pillStyle + ' title="Tap to change color">' + escapeHtml(s.name) + '</button>' +
      '</div>' +
      starsHtml +
      skillZoneHtml +
    '</div>';
  }

  function findStudent(id){
    return state.currentClass.students.find(function(s){ return s.id === id; });
  }

  function wireRosterEvents(){
    var scroll = document.getElementById('rosterScroll');
    scroll.addEventListener('click', function(e){
      var faceBtn = e.target.closest('[data-face]');
      if(faceBtn){
        var s1 = findStudent(faceBtn.getAttribute('data-face'));
        s1.negative = clamp(s1.negative + 1, 0, 3);
        afterStudentChange();
        return;
      }
      var olderFace = e.target.closest('[data-older-face]');
      if(olderFace){
        var sof = findStudent(olderFace.getAttribute('data-older-face'));
        sof.negative = (clamp(sof.negative, 0, 3) + 1) % 4;
        afterStudentChange();
        return;
      }
      var dots = e.target.closest('[data-dots]');
      if(dots){
        var s2 = findStudent(dots.getAttribute('data-dots'));
        s2.negative = clamp(s2.negative - 1, 0, 3);
        afterStudentChange();
        return;
      }
      var olderStar = e.target.closest('[data-older-star]');
      if(olderStar){
        var sos = findStudent(olderStar.getAttribute('data-stu'));
        if(olderStar.getAttribute('data-older-star') === 'add') sos.positive = sos.positive + 1;
        else sos.positive = clamp(sos.positive - 1, 0, 999999);
        afterStudentChange();
        return;
      }
      var star = e.target.closest('[data-star]');
      if(star){
        var s3 = findStudent(star.getAttribute('data-stu'));
        var idx = Number(star.getAttribute('data-star'));
        if(idx === 4){ s3.positive = s3.positive + 1; }
        else { s3.positive = clamp(s3.positive - 1, 0, 999999); }
        afterStudentChange();
        return;
      }
      var rangeChip = e.target.closest('[data-older-range]');
      if(rangeChip){
        var sr = findStudent(rangeChip.getAttribute('data-stu'));
        var rkey = rangeChip.getAttribute('data-older-range');
        ensureSkillsOlder(sr);
        sr.skillsOlder[rkey] = cycleRange(sr.skillsOlder[rkey]);
        afterStudentChange();
        return;
      }
      var qualityChip = e.target.closest('[data-older-quality]');
      if(qualityChip){
        var sq = findStudent(qualityChip.getAttribute('data-stu'));
        ensureSkillsOlder(sq);
        sq.skillsOlder.quality = cycleQuality(sq.skillsOlder.quality);
        afterStudentChange();
        return;
      }
      var chip = e.target.closest('[data-skill]');
      if(chip){
        var s4 = findStudent(chip.getAttribute('data-stu'));
        var key = chip.getAttribute('data-skill');
        s4.skills[key] = !s4.skills[key];
        afterStudentChange();
        return;
      }
      var namePill = e.target.closest('[data-namecolor]');
      if(namePill){
        var s5 = findStudent(namePill.getAttribute('data-namecolor'));
        var size = paletteSize();
        s5.colorIndex = ((s5.colorIndex || 0) + 1) % size;
        afterStudentChange();
        return;
      }
    });
  }

  function afterStudentChange(){
    persistCurrent();
    refreshRosterOnly();
    renderCelebration();
  }

  // Re-render just the row contents (keeps scroll position) without a full screen rebuild
  function refreshRosterOnly(){
    var scroll = document.getElementById('rosterScroll');
    var scrollTop = scroll.scrollTop;
    var cls = state.currentClass;
    var older = isOlderClass(cls);
    var showLeftNeg = !older && !!cls.negativeEnabled;
    var rows = presentStudents(cls).map(function(s){ return rowTemplate(s, showLeftNeg, older); }).join('');
    scroll.innerHTML = (older && uiSkillsVisible ? olderColHeadersHtml() : '') + rows;
    scroll.scrollTop = scrollTop;
    updateSkillButtonStates();
  }

  function applyBulk(action){
    presentStudents(state.currentClass).forEach(function(s){
      if(action === 'neg+') s.negative = clamp(s.negative + 1, 0, 3);
      if(action === 'neg-') s.negative = clamp(s.negative - 1, 0, 3);
      if(action === 'pos+') s.positive = s.positive + 1;
      if(action === 'pos-') s.positive = clamp(s.positive - 1, 0, 999999);
    });
    afterStudentChange();
  }

  function applyBulkSkill(key){
    var students = presentStudents(state.currentClass);
    var anyOff = students.some(function(s){ return !s.skills[key]; });
    students.forEach(function(s){ s.skills[key] = anyOff; });
    afterStudentChange();
  }

  function applyBulkRange(key, dir){
    if(OLDER_RANGE_KEYS.indexOf(key) < 0) return;
    presentStudents(state.currentClass).forEach(function(s){
      ensureSkillsOlder(s);
      s.skillsOlder[key] = stepRange(s.skillsOlder[key], dir);
    });
    afterStudentChange();
  }

  function applyBulkQuality(dir){
    var step = dir < 0 ? -1 : 1;
    presentStudents(state.currentClass).forEach(function(s){
      ensureSkillsOlder(s);
      s.skillsOlder.quality = stepQuality(s.skillsOlder.quality, step);
    });
    afterStudentChange();
  }

  function updateSkillButtonStates(){
    if(isOlderClass(state.currentClass)) return;
    var students = presentStudents(state.currentClass);
    ['songs','stories','phonics','blending'].forEach(function(key){
      var btn = document.querySelector('[data-bulk-skill="' + key + '"]');
      if(!btn) return;
      var allOn = students.length > 0 && students.every(function(s){ return s.skills[key]; });
      btn.classList.toggle('all-on', allOn);
    });
  }

  /* ---------------- celebration board ---------------- */

  function renderCelebration(){
    var pane = document.getElementById('celebrationPane');
    if(!pane) return;
    var students = presentStudents(state.currentClass);
    var older = isOlderClass(state.currentClass);

    // Star Ninja is a milestone, not a ranking -- everyone who reaches the
    // star target earns it, shown alongside their current count.
    var starNinjas = students.filter(function(s){ return s.positive >= STAR_MILESTONE; })
      .map(function(s){ return escapeHtml(s.name) + ': ' + s.positive; });

    function achCard(icon, title, names){
      if(!names.length) return '';
      return '' +
      '<div class="ach-card">' +
        '<span class="ach-icon">' + icon + '</span>' +
        '<div class="ach-body">' +
          '<div class="ach-title">' + title + '</div>' +
          '<div class="ach-list">' + names.join(', ') + '</div>' +
        '</div>' +
      '</div>';
    }

    var cards = achCard('🌟', 'Star Ninja', starNinjas);
    if(!older){
      var singStars = students.filter(function(s){ return s.skills.songs; }).map(function(s){ return s.name; });
      var storyTellers = students.filter(function(s){ return s.skills.stories; }).map(function(s){ return s.name; });
      var phonicsBosses = students.filter(function(s){ return s.skills.phonics; }).map(function(s){ return s.name; });
      var blendingKings = students.filter(function(s){ return s.skills.blending; }).map(function(s){ return s.name; });
      cards +=
        achCard('🎵', 'Sing Star', singStars.map(escapeHtml)) +
        achCard('📖', 'Story Teller', storyTellers.map(escapeHtml)) +
        achCard('🔤', 'Phonics Boss', phonicsBosses.map(escapeHtml)) +
        achCard('🗣️', 'Blending King', blendingKings.map(escapeHtml));
    } else {
      var excellentQuality = students.filter(function(s){ return ensureSkillsOlder(s).quality === 4; }).map(function(s){ return s.name; });
      var topUnd = students.filter(function(s){ return ensureSkillsOlder(s).understanding === 100; }).map(function(s){ return s.name; });
      cards +=
        achCard('✨', 'Excellent Quality', excellentQuality.map(escapeHtml)) +
        achCard('🧠', 'Full Understanding', topUnd.map(escapeHtml));
    }

    if(!cards){ pane.innerHTML = ''; return; }

    pane.innerHTML =
      '<button class="cel-toggle" id="toggleCelebrationBtn">' +
        (uiCelebrationCollapsed ? '▸ Achievements' : '▾ Achievements') +
      '</button>' +
      (uiCelebrationCollapsed ? '' : '<div class="ach-grid">' + cards + '</div>');

    document.getElementById('toggleCelebrationBtn').addEventListener('click', function(){
      uiCelebrationCollapsed = !uiCelebrationCollapsed;
      renderCelebration();
    });

  /* ---------------- rewards ---------------- */
  // One stamp per positive action, except every full group of 5 stars
  // converts into 1 sticker + 1 stamp (instead of 5 stamps), so a student
  // never gets both the full stamp value and the sticker for those stars.
  // Negative marks subtract stamps (never stickers), floored at 0.
  function computeReward(s){
    var stickers = Math.floor(s.positive / STAR_MILESTONE);
    var leftoverStars = s.positive % STAR_MILESTONE;
    var starStamps = stickers + leftoverStars;
    var skillCount;
    if(isOlderClass(state.currentClass)){
      var so = ensureSkillsOlder(s);
      skillCount = 0;
      if(so.vocabulary >= 75) skillCount++;
      if(so.understanding >= 75) skillCount++;
      if(so.interaction >= 75) skillCount++;
      if(so.quality >= 3) skillCount++;
    } else {
      skillCount = ['songs','stories','phonics','blending'].filter(function(k){ return s.skills[k]; }).length;
    }
    var stamps = Math.max(0, starStamps + skillCount - s.negative);
    return { stickers: stickers, stamps: stamps };
  }
  function formatReward(r){
    var parts = [];
    if(r.stickers > 0) parts.push(r.stickers + (r.stickers === 1 ? ' sticker' : ' stickers'));
    if(r.stamps > 0) parts.push(r.stamps + (r.stamps === 1 ? ' stamp' : ' stamps'));
    return parts.length ? parts.join(' and ') : 'No reward yet';
  }
  function toggleRewardsModal(){
    if(document.getElementById('rewardsOverlay')){ closeRewardsModal(); return; }
    var cls = state.currentClass;
    var rowsHtml = presentStudents(cls).map(function(s){
      return '<div class="reward-row"><span class="reward-name">' + escapeHtml(s.name) + '</span>' +
        '<span class="reward-value">' + formatReward(computeReward(s)) + '</span></div>';
    }).join('');
    if(!rowsHtml) rowsHtml = '<div class="reward-empty">No students yet.</div>';

    var overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'rewardsOverlay';
    overlay.innerHTML =
      '<div class="modal-card">' +
        '<div class="modal-header">' +
          '<div class="modal-title">🎁 Rewards</div>' +
          '<button class="modal-close" id="rewardsCloseBtn">✕</button>' +
        '</div>' +
        '<div class="modal-body">' + rowsHtml + '</div>' +
      '</div>';
    document.body.appendChild(overlay);
    document.getElementById('rewardsCloseBtn').addEventListener('click', closeRewardsModal);
    overlay.addEventListener('click', function(e){ if(e.target === overlay) closeRewardsModal(); });
  }

  /* ---------------- CSV export ---------------- */
  function exportCsv(){
    var cls = state.currentClass;
    var older = isOlderClass(cls);
    var liveStudents = presentStudents(cls);
    var header, rows;
    if(older){
      header = ['Student Name','Positive Score','Negative Score','Vocabulary','Understanding','Quality','Interaction','Complete','Effort','HW Quality'];
      rows = liveStudents.map(function(s){
        var so = ensureSkillsOlder(s);
        var hw = ensureHomework(s);
        return [
          csvEscape(s.name), s.positive, s.negative,
          so.vocabulary, so.understanding, QUALITY_LABELS[so.quality], so.interaction,
          lmsLabel(hw.complete), lmsLabel(hw.effort), lmsLabel(hw.quality)
        ].join(',');
      });
    } else {
      header = ['Student Name','Positive Score','Negative Score','Songs & Chants','Stories & Chants','Phonics','Blending','Complete','Effort','HW Quality'];
      rows = liveStudents.map(function(s){
        var hw = ensureHomework(s);
        return [
          csvEscape(s.name), s.positive, s.negative,
          s.skills.songs ? 'TRUE' : 'FALSE',
          s.skills.stories ? 'TRUE' : 'FALSE',
          s.skills.phonics ? 'TRUE' : 'FALSE',
          s.skills.blending ? 'TRUE' : 'FALSE',
          lmsLabel(hw.complete), lmsLabel(hw.effort), lmsLabel(hw.quality)
        ].join(',');
      });
    }
    var csv = header.join(',') + '\n' + rows.join('\n');
    var blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'class_behavior_Tracker_' + todayISO() + '.csv';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    showToast('CSV exported.');
  }
  function csvEscape(v){
    var s = String(v);
    if(/[",\n]/.test(s)) s = '"' + s.replace(/"/g,'""') + '"';
    return s;
  }

  /* ---------------- LMS mapping (older classes) ---------------- */
  function pctToLms(pct){
    var n = normalizeRangePct(pct);
    if(n >= 100) return 4;
    if(n >= 75) return 3;
    return 2;
  }

  function mapActiveFromStars(positive){
    if(positive >= 5) return 4;
    if(positive >= 3) return 3;
    return 2;
  }

  function mapAttitude(s){
    // Fair only when zero stars AND at least one bad-behavior mark.
    if(s.positive === 0 && s.negative >= 1) return 2;
    if(s.positive >= 5 && s.negative === 0) return 4;
    return 3;
  }

  function mapDiscipline(negative){
    var n = clamp(negative, 0, 3);
    if(n === 0) return 4;
    if(n === 1) return 3;
    if(n === 2) return 2;
    return 1;
  }

  function buildOlderLmsRows(cls){
    return cls.students.map(function(s){
      var so = ensureSkillsOlder(s);
      var attitude = mapAttitude(s);
      var active = mapActiveFromStars(s.positive);
      var understand = pctToLms(so.understanding);
      var quality = normalizeQuality(so.quality);
      var discipline = mapDiscipline(s.negative);
      return {
        studentName: s.name,
        attitude: attitude,
        active: active,
        understand: understand,
        quality: quality,
        discipline: discipline
      };
    });
  }

  function formatLmsCell(score){
    return LMS_LABELS[score] + ' (' + score + ')';
  }
